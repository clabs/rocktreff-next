name: Build & Deploy rocktreff.de

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.162.0"
          extended: false

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: resources/_gen
          key: ${{ runner.os }}-hugo-${{ hashFiles('layouts/**', 'assets/**', 'content/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build
        run: hugo --environment production --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
